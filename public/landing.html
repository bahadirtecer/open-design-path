<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CourtZone — Yakında açılıyoruz</title>
  <meta name="description" content="CourtZone yakında sizlerle. Amatör tenis için ligler, turnuvalar ve canlı maçlar tek platformda." />
  <meta property="og:title" content="CourtZone — Yakında açılıyoruz" />
  <meta property="og:description" content="Amatör tenis için ligler, turnuvalar ve canlı maçlar tek platformda." />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;700&display=swap" />
  <style>
    *,*::before,*::after{box-sizing:border-box}
    html,body{margin:0;padding:0}
    :root{
      --bg:#0b0f0c;
      --fg:#f4f7f5;
      --muted:#9aa39d;
      --primary:#a3e635;
      --primary-soft:rgba(163,230,53,.14);
      --primary-border:rgba(163,230,53,.28);
      --surface:rgba(255,255,255,.04);
      --surface-border:rgba(255,255,255,.08);
    }
    body{
      min-height:100vh;
      background:
        radial-gradient(1200px 600px at 80% -10%, rgba(163,230,53,.18), transparent 60%),
        radial-gradient(900px 500px at -10% 110%, rgba(56,189,124,.14), transparent 60%),
        var(--bg);
      color:var(--fg);
      font-family:'Manrope',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      -webkit-font-smoothing:antialiased;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      text-align:center;
      padding:48px 24px;
    }
    .logo{height:200px;width:auto;margin-bottom:24px;filter:drop-shadow(0 8px 32px rgba(163,230,53,.25))}
    .badge{
      display:inline-flex;align-items:center;gap:8px;
      padding:6px 14px;border-radius:999px;
      background:var(--primary-soft);color:var(--primary);
      border:1px solid var(--primary-border);
      font-size:12px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;
    }
    .badge .dot{width:8px;height:8px;border-radius:999px;background:var(--primary);box-shadow:0 0 12px var(--primary)}
    h1{
      font-family:'Instrument Serif',serif;
      font-size:clamp(48px,8vw,96px);line-height:1.05;
      margin:24px 0 16px;font-weight:500;letter-spacing:-1px;
    }
    h1 em{color:var(--primary);font-style:italic}
    .lede{max-width:560px;font-size:18px;line-height:1.6;color:var(--muted);margin:0 auto}
    .countdown{display:flex;gap:12px;margin-top:40px;flex-wrap:wrap;justify-content:center}
    .box{
      min-width:96px;padding:18px 16px;border-radius:16px;
      background:var(--surface);border:1px solid var(--surface-border);
      backdrop-filter:blur(8px);
    }
    .box .num{font-family:'JetBrains Mono',monospace;font-size:36px;font-weight:700;line-height:1}
    .box .lbl{font-size:11px;margin-top:6px;text-transform:uppercase;letter-spacing:1px;opacity:.7}
    form{margin-top:40px;display:flex;gap:8px;width:100%;max-width:460px;flex-wrap:wrap;justify-content:center}
    input[type=email]{
      flex:1 1 240px;padding:14px 18px;border-radius:999px;
      border:1px solid rgba(255,255,255,.15);
      background:rgba(255,255,255,.03);color:var(--fg);
      font-size:15px;outline:none;font-family:inherit;
    }
    input[type=email]:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
    button{
      padding:14px 24px;border-radius:999px;border:none;
      background:var(--primary);color:#0b0f0c;font-weight:700;font-size:15px;
      cursor:pointer;font-family:inherit;transition:transform .15s ease, box-shadow .15s ease;
    }
    button:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(163,230,53,.35)}
    .ok{margin-top:14px;font-size:13px;color:var(--primary);min-height:18px}
    footer{margin-top:64px;font-size:12px;opacity:.6}
  </style>
</head>
<body>
  <img src="/courtzone-main.png" alt="CourtZone" class="logo" />

  <span class="badge"><span class="dot"></span>Yakında</span>

  <h1>Yakında <em>açılıyoruz</em></h1>

  <p class="lede">
    Amatör tenis için ligler, turnuvalar ve canlı maçları tek platformda topluyoruz.
    Lansmana kısa bir süre kaldı — haberdar olmak için e-postanı bırak.
  </p>

  <div class="countdown" id="countdown">
    <div class="box"><div class="num" id="d">00</div><div class="lbl">Gün</div></div>
    <div class="box"><div class="num" id="h">00</div><div class="lbl">Saat</div></div>
    <div class="box"><div class="num" id="m">00</div><div class="lbl">Dakika</div></div>
    <div class="box"><div class="num" id="s">00</div><div class="lbl">Saniye</div></div>
  </div>

  <form id="signup">
    <input type="email" required placeholder="ornek@eposta.com" />
    <button type="submit">Beni haberdar et</button>
  </form>
  <p class="ok" id="ok"></p>

  <footer>© <span id="yr"></span> CourtZone — Tüm hakları saklıdır.</footer>

  <script>
    var target = Date.now() + 30*86400000;
    var pad = function(n){return String(n).padStart(2,'0')};
    function tick(){
      var diff = Math.max(0, target - Date.now());
      document.getElementById('d').textContent = pad(Math.floor(diff/86400000));
      document.getElementById('h').textContent = pad(Math.floor((diff%86400000)/3600000));
      document.getElementById('m').textContent = pad(Math.floor((diff%3600000)/60000));
      document.getElementById('s').textContent = pad(Math.floor((diff%60000)/1000));
    }
    tick(); setInterval(tick,1000);
    document.getElementById('yr').textContent = new Date().getFullYear();
    document.getElementById('signup').addEventListener('submit', function(e){
      e.preventDefault();
      this.querySelector('button').textContent = 'Teşekkürler!';
      document.getElementById('ok').textContent = 'Listeye eklendin. Lansman gününde haber vereceğiz.';
    });
  </script>
</body>
</html>
